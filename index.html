<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Sonic NFC Player</title>

<style>
•⁠  ⁠{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial;
}

#app {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BACKGROUND */
#bg-container {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 1;
}

#bg-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(30px) brightness(0.5);
}

/* CONTENT */
#content {
    position: relative;
    z-index: 2;
    text-align: center;
}

/* RECORD */
.record-container {
    width: 90vw;
    max-width: 500px;
    aspect-ratio: 1/1;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

#record-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.08);
}

/* BUTTON */
#play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

#play-btn svg {
    width: 30px;
    fill: white;
}

/* TITLE */
#song-title {
    margin-top: 40px;
    color: white;
    font-size: 24px;
}

/* ANIMATION */
@keyframes spin {
    from { transform: rotate(0deg) scale(1.08); }
    to { transform: rotate(360deg) scale(1.08); }
}

.spinning {
    animation: spin 10s linear infinite;
}

audio {
    display: none;
}
</style>
</head>

<body>

<div id="app">

<div id="bg-container">
    <img id="bg-image" src="">
</div>

<div id="content">

    <div class="record-container">
        <img id="record-img" src="">
        
        <div id="play-btn">
            <svg viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"></path>
            </svg>
        </div>
    </div>

    <h1 id="song-title"></h1>

</div>

<audio id="audio-player"></audio>

</div>

<script>

/* 🎯 פה את מוסיפה שירים כמה שבא לך */
const songData = {
    '1': { bg:'bg1.jpg', record:'record1.png', audio:'song1.mp3', title:'אהבה ממבט ראשון' },
    '2': { bg:'bg2.jpg', record:'record2.png', audio:'song2.mp3', title:'הפרח בגני' },
    '3': { bg:'bg3.jpg', record:'record3.png', audio:'song3.mp3', title:'חוזה בנשמה' },
    '4': { bg:'bg4.jpg', record:'record4.png', audio:'song4.mp3', title:'גברת טיקטוק' }
};

const bgImg = document.getElementById('bg-image');
const recordImg = document.getElementById('record-img');
const title = document.getElementById('song-title');
const audio = document.getElementById('audio-player');
const playBtn = document.getElementById('play-btn');

let playing = false;

function init() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('song') || '1';

    const data = songData[id] || songData['1'];

    bgImg.src = data.bg;
    recordImg.src = data.record;
    audio.src = data.audio;
    title.innerText = data.title;
}

playBtn.onclick = () => {
    if (playing) return;

    playing = true;
    audio.play();

    recordImg.classList.add('spinning');
    playBtn.style.display = "none";
};

window.onload = init;

</script>

</body>
</html>
