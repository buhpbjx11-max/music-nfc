<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Music NFC</title>

<style>
•⁠  ⁠{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

#app {
    position: relative;
    height: 100%;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

#bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(30px);
    transform: scale(1.1);
}

.record {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    animation: spin 10s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

#title {
    position: absolute;
    bottom: 60px;
    color: white;
    font-size: 22px;
    text-align: center;
}
</style>
</head>

<body>

<div id="app">
    <img id="bg">
    <img id="record" class="record">
    <div id="title"></div>
    <audio id="audio" autoplay loop></audio>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('song') || '1';

// תמונות ושיר לפי מספר
document.getElementById("bg").src = ⁠ bg${id}.jpg ⁠;
document.getElementById("record").src = ⁠ record${id}.png ⁠;
document.getElementById("audio").src = ⁠ song${id}.mp3 ⁠;

// כותרות (אפשר לשנות רק כאן אם רוצים)
const titles = {
    1: "אהבה ממבט ראשון",
    2: "הפרח בגני",
    3: "חוזה בנשמה"
};

document.getElementById("title").innerText = titles[id] || "";
</script>

</body>
</html>
